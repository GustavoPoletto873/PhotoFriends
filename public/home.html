<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Friends — Álbuns</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">
      <span class="nav-logo-icon">📸</span>
      <span class="nav-logo-text">Photo Friends</span>
    </div>
    <div class="nav-right">
      <span class="nav-user-name" id="nav-user-name"></span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sair</button>
    </div>
  </nav>

  <div class="page">
    <div class="container">
      <div class="page-header">
        <h1>Seus <span>álbuns</span></h1>
        <button class="btn btn-primary" id="new-album-btn">+ Novo álbum</button>
      </div>
      <div class="albums-grid" id="albums-grid">
        <div class="empty-state">
          <div class="empty-state-icon">⏳</div>
          <h3>Carregando álbuns...</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="new-album-modal">
    <div class="modal-box">
      <h2 class="modal-title">Novo álbum</h2>
      <form class="modal-form" id="new-album-form">
        <div class="form-group">
          <label class="form-label">Nome do álbum</label>
          <input type="text" class="input" id="album-name" placeholder="Ex: Rolê da Praia — Jun 2025" required>
        </div>
        <div class="form-group">
          <label class="form-label">Descrição (opcional)</label>
          <input type="text" class="input" id="album-desc" placeholder="Uma breve descrição...">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancel-album-btn">Cancelar</button>
          <button type="submit" class="btn btn-primary">Criar álbum</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>
  <script src="/js/home.js"></script>
</body>
</html>
