<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Friends — Álbum</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">
      <span class="nav-logo-icon">📸</span>
      <span class="nav-logo-text">Photo Friends</span>
    </div>
    <div class="nav-right">
      <span class="nav-user-name" id="nav-user-name"></span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sair</button>
    </div>
  </nav>

  <div class="page">
    <div class="container">
      <div class="album-page-header">
        <a href="/home.html" class="album-back">← Todos os álbuns</a>
        <div class="album-title-row">
          <div>
            <h1 class="album-title" id="album-title">Carregando...</h1>
            <p class="album-description" id="album-description"></p>
            <div class="members-row" id="members-row"></div>
          </div>
          <div class="album-actions">
            <button class="btn btn-ghost btn-sm" id="invite-btn">+ Convidar</button>
            <button class="btn btn-danger btn-sm" id="delete-album-btn" style="display:none">Deletar álbum</button>
          </div>
        </div>
      </div>

      <div class="upload-zone" id="upload-zone">
        <input type="file" class="upload-input" id="upload-input" multiple accept="image/*,video/*">
        <div class="upload-icon">📸</div>
        <div class="upload-title">Arraste fotos e vídeos aqui</div>
        <div class="upload-subtitle">ou clique para selecionar · JPG, PNG, GIF, MP4, MOV</div>
        <div class="upload-progress" id="upload-progress">
          <div class="upload-progress-bar" id="upload-progress-bar"></div>
        </div>
      </div>

      <div class="media-section-header">
        <span class="media-count-label" id="media-count-label">0 itens</span>
      </div>

      <div class="media-grid" id="media-grid">
        <p style="color:var(--text-muted);font-size:.875rem;padding:2rem 0">
          Nenhuma foto ainda. Seja o primeiro a enviar! 🎉
        </p>
      </div>
    </div>
  </div>

  <!-- Invite modal -->
  <div class="modal-overlay" id="invite-modal">
    <div class="modal-box">
      <h2 class="modal-title">Convidar amigo</h2>
      <form class="modal-form" id="invite-form">
        <div class="form-group">
          <label class="form-label">Username do amigo</label>
          <input type="text" class="input" id="invite-username" placeholder="usuario_do_amigo" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancel-invite-btn">Cancelar</button>
          <button type="submit" class="btn btn-primary">Convidar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightbox-next">&#8250;</button>
    <img class="lightbox-media" id="lightbox-img" src="" alt="" style="display:none">
    <video class="lightbox-media" id="lightbox-video" controls style="display:none"></video>
    <div class="lightbox-info" id="lightbox-info"></div>
  </div>

  <div class="toast-container" id="toasts"></div>
  <script src="/js/album.js"></script>
</body>
</html>
