{% extends 'landing/base.html' %}

{% block title %}Photo Friends — Recuperar senha{% endblock %}

{% block body %}
<div class="page-anim" aria-hidden="true"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🔑</div>
      <div class="auth-logo-text">Recuperar senha</div>
      <div class="auth-logo-tag">Informe seu e-mail para receber o link</div>
    </div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">E-mail da conta</label>
        <input type="email" name="email" class="input" placeholder="seu@email.com" autocomplete="email" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Enviar link de recuperação</button>
    </form>

    <div class="auth-hint">
      Lembrou? <a href="{% url 'login' %}" style="color:var(--app-pink);text-decoration:none;">Voltar ao login</a>
    </div>
  </div>
</div>
{% endblock %}
