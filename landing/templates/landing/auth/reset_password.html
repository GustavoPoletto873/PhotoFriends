{% extends 'landing/base.html' %}

{% block title %}Photo Friends — Nova senha{% endblock %}

{% block body %}
<div class="page-anim" aria-hidden="true"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🔒</div>
      <div class="auth-logo-text">Nova senha</div>
      <div class="auth-logo-tag">Digite o código recebido e sua nova senha</div>
    </div>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Código de verificação</label>
        <input type="text" name="code" class="input input--code" placeholder="000000" maxlength="6" inputmode="numeric" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input type="password" name="password" class="input" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar nova senha</label>
        <input type="password" name="password_confirm" class="input" placeholder="••••••" required>
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Redefinir senha</button>
    </form>
  </div>
</div>
{% endblock %}
