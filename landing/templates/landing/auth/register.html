{% extends 'landing/base.html' %}
{% load static %}

{% block title %}Photo Friends — Criar conta{% endblock %}

{% block body %}
<div class="page-anim" aria-hidden="true"></div>

<div class="auth-page">
  <div class="auth-card auth-card--wide">
    <div class="auth-logo">
      <div class="auth-logo-icon">📸</div>
      <div class="auth-logo-text">Photo Friends</div>
    </div>

    <div class="auth-tabs">
      <a href="{% url 'login' %}" class="auth-tab">Entrar</a>
      <a href="{% url 'register' %}" class="auth-tab active">Cadastrar</a>
    </div>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" enctype="multipart/form-data" class="auth-form">
      {% csrf_token %}

      <!-- Avatar upload -->
      <div class="avatar-upload-row">
        <div class="avatar-preview" id="avatar-preview">
          <span class="avatar-placeholder-icon">👤</span>
        </div>
        <div>
          <label for="id_avatar" class="btn btn-ghost btn-sm" style="cursor:pointer">Foto de perfil</label>
          <input type="file" id="id_avatar" name="avatar" accept="image/*" style="display:none">
          <p style="font-size:0.72rem;color:var(--text-subtle);margin-top:0.3rem">Opcional</p>
        </div>
      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Nome</label>
          <input type="text" name="first_name" class="input" placeholder="Pedro" autocomplete="given-name" value="{{ form.first_name.value|default:'' }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Sobrenome</label>
          <input type="text" name="last_name" class="input" placeholder="Souza" autocomplete="family-name" value="{{ form.last_name.value|default:'' }}" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input type="text" name="username" class="input" placeholder="pedro_souza" autocomplete="username" value="{{ form.username.value|default:'' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" name="email" class="input" placeholder="pedro@email.com" autocomplete="email" value="{{ form.email.value|default:'' }}" required>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" name="password" class="input" placeholder="Mín. 6 caracteres" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar</label>
          <input type="password" name="password_confirm" class="input" placeholder="••••••" autocomplete="new-password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary auth-submit">Criar conta grátis</button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.getElementById('id_avatar').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const p = document.getElementById('avatar-preview');
      p.style.backgroundImage = `url(${e.target.result})`;
      p.innerHTML = '';
    };
    reader.readAsDataURL(file);
  });
</script>
{% endblock %}
