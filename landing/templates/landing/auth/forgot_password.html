{% extends 'landing/base.html' %}

{% block title %}Photo Friends — Esqueceu a senha{% endblock %}

{% block body %}
<div class="page-anim" aria-hidden="true"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🔑</div>
      <div class="auth-logo-text">Recuperar senha</div>
      <div class="auth-logo-tag">Enviaremos um código no seu e-mail</div>
    </div>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">E-mail cadastrado</label>
        <input type="email" name="email" class="input" placeholder="pedro@email.com" autocomplete="email" required>
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Enviar código</button>
    </form>

    <div class="auth-resend">
      <a href="{% url 'login' %}">← Voltar ao login</a>
    </div>
  </div>
</div>
{% endblock %}
