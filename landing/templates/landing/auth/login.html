{% extends 'landing/base.html' %}
{% load static %}

{% block title %}Photo Friends — Entrar{% endblock %}

{% block body %}
<div class="page-anim" aria-hidden="true"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">📸</div>
      <div class="auth-logo-text">Photo Friends</div>
      <div class="auth-logo-tag">Suas fotos com os amigos</div>
    </div>

    <div class="auth-tabs">
      <a href="{% url 'login' %}" class="auth-tab active">Entrar</a>
      <a href="{% url 'register' %}" class="auth-tab">Cadastrar</a>
    </div>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input type="text" name="username" class="input" placeholder="seu_usuario" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="input" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <a href="{% url 'password_reset' %}" class="auth-forgot">Esqueceu a senha?</a>
      <button type="submit" class="btn btn-primary auth-submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
