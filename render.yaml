databases:
  - name: photo-friends-db
    plan: free
    databaseName: photofriends
    user: photofriends

services:
  - type: web
    name: photo-friends
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py download_bg_model && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn edition_hub.wsgi:application --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: photo-friends-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SECRET_KEY
        generateValue: true
